[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --cov=app
    --cov-report=term-missing
    --cov-report=html
    --benchmark-only
    --benchmark-autosave
    --benchmark-compare
    --benchmark-compare-fail=min:5%
    --timeout=300
    -n auto

markers =
    unit: Unit tests
    integration: Integration tests
    ai: AI feature tests
    audio: Audio processing tests
    ui: UI component tests
    e2e: End-to-end tests
    performance: Performance and load tests

env =
    D:COHERE_API_KEY=your-cohere-api-key
    D:OPENAI_API_KEY=your-openai-api-key
    D:ANTHROPIC_API_KEY=your-anthropic-api-key
    D:PINECONE_API_KEY=your-pinecone-api-key
    D:PINECONE_ENVIRONMENT=your-pinecone-environment
